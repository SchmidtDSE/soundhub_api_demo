name: soundhub
description: |
  Wildlife Soundhub API: powering an online platform for storing, analyzing and sharing bioacoustic data.
authors:
  - url: https://gif.berkeley.edu/
    email: bgaley@berkeley.edu 
  - url: https://dse.berkeley.edu/
    email: bguzder-williams@berkeley.edu 

remotes:
  - core

databases:
  - owl

# Non-remote endpoints (API Dock's own endpoints)
endpoints:
  - "/"                    # API metadata and information

# Global restrictions (applied to all remotes unless overridden)
restricted:
  - route: "*"
    method: delete 